{% extends "base.html" %}
{% block content %}
<section class="form-panel-editorial">
  <p class="eyebrow">Espace artisan</p>
  <h1 class="section-title">Inscription artisan</h1>
  <p class="muted">Après inscription, validez email/téléphone depuis votre profil.</p>
  <form method="post" class="form-stack">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">Créer mon compte artisan</button>
  </form>
</section>
{% endblock %}
