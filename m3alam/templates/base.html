{% load static %}
<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>M3alam - Plateforme artisans</title>
  <link rel="stylesheet" href="{% static 'css/theme.css' %}">
</head>
<body>
  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="/">M3alam</a>
      <nav class="nav-links">
        <a class="nav-pill" href="/travaux/">Demandes</a>
        <a class="nav-pill" href="/travaux/nouveau/">Publier une demande</a>
        <a class="nav-pill" href="/portail-admin/">Portail admin</a>
        {% if user.is_authenticated %}
          <a class="btn-secondary btn" href="/comptes/deconnexion/">Déconnexion</a>
        {% else %}
          <a class="btn-secondary" href="/comptes/connexion/">Connexion</a>
        {% endif %}
      </nav>
    </div>
  </header>
  <main class="layout">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    M3alam — Artisans vérifiés au Maroc • Réponse rapide • Service suivi
  </footer>
</body>
</html>
