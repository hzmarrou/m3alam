{% extends "base.html" %}
{% block content %}
<section class="form-panel-editorial">
  <p class="eyebrow">Réponse artisan</p>
  <h1 class="section-title">Envoyer une offre</h1>
  <p><strong>Travail:</strong> {{ job.title }} ({{ job.city }})</p>
  <form method="post" class="form-stack">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">Envoyer mon offre</button>
  </form>
</section>
{% endblock %}
